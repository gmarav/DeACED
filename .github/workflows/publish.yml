# Publish to PyPI on a version tag, using Trusted Publishing (OIDC) -- no API
# token is stored. One-time setup before the first tag:
#   1. Create the project's trusted publisher on PyPI:
#      https://pypi.org/manage/account/publishing/  (owner: gmarav, repo: DeACED,
#      workflow: publish.yml, environment: pypi)
#   2. Create a GitHub environment named "pypi" (repo Settings -> Environments).
name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/deaced
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
